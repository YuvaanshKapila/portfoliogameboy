<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Yuvaansh Kapila</title>
  <link rel="icon" type="image/jpeg" href="/favicon.jpeg" />
  <link rel="apple-touch-icon" href="/favicon.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Cabin Bold Italic ≈ Gill Sans Italic (Game Boy wordmark + A/B button letters)
       Jost ≈ Futura (small DMG silkscreen labels: BATTERY, OFF/ON, PHONES, START, SELECT) -->
  <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,500;0,700;1,500;1,700&family=Jost:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Lilita+One&family=Bowlby+One&family=Kalam:wght@400;700&family=Caveat:wght@500;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <!-- Volume widget (top-right) — works on both desktop and mobile.
       The icon button toggles a slider panel. -->
  <div id="volume-widget" class="volume-widget">
    <button id="volume-toggle" class="volume-toggle" type="button" aria-label="Volume">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 0 0-2.5-4.03v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/>
      </svg>
    </button>
    <div id="volume-panel" class="volume-panel" role="group" aria-label="Volume slider">
      <input id="volume-slider" type="range" min="0" max="1" step="0.01" />
    </div>
  </div>

  <!-- Mobile-only landing notice: subtle dim overlay, minimal text.
       Hidden on desktop via CSS. -->
  <div id="mobile-warning" class="mobile-warning">
    <div class="mobile-warning-text">
      this experience is best on pc<br/>
      <button id="mobile-warning-continue" class="mobile-warning-btn" type="button">
        continue anyway
      </button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
